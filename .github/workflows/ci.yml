name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv pip install -r backend/requirements.txt
    - name: Lint
      run: |
        pip install ruff
        ruff check backend/app
    - name: Run tests
      run: |
        pip install pytest
        pytest backend/tests
    - name: Build Docker images
      run: |
        docker build -t cyberthreatforge-backend:latest -f backend/Dockerfile .
        docker build -t cyberthreatforge-frontend:latest -f frontend/Dockerfile .
    - name: Push images (optional)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        docker tag cyberthreatforge-backend:latest ${{ secrets.DOCKER_REGISTRY }}/cyberthreatforge-backend:latest
        docker push ${{ secrets.DOCKER_REGISTRY }}/cyberthreatforge-backend:latest
        docker tag cyberthreatforge-frontend:latest ${{ secrets.DOCKER_REGISTRY }}/cyberthreatforge-frontend:latest
        docker push ${{ secrets.DOCKER_REGISTRY }}/cyberthreatforge-frontend:latest
