name: CyberThreatForge CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        pip install pytest httpx jose

    - name: Compile Syntax Verification
      run: |
        python -m py_compile backend/app/main.py backend/app/auth.py backend/app/database.py backend/app/models.py backend/app/schemas.py

    - name: Run Integration Tests
      run: |
        python test_backend.py
