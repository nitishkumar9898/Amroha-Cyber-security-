version: "3.9"

x-postgres-common: &postgres-common
  image: postgres:16-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ctf_admin -d cyberthreatforge"]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  # --- PostgreSQL (Structured Data + Vector via pgvector) ---
  postgres:
    <<: *postgres-common
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cyberthreatforge
      POSTGRES_USER: ctf_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    networks:
      - ctf-network

  # --- Neo4j (Graph Evidence Correlation) ---
  neo4j:
    image: neo4j:5-enterprise
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./database/scripts/neo4j-constraints.cypher:/var/lib/neo4j/import/constraints.cypher
    networks:
      - ctf-network

  # --- Redis (Session Cache / Rate Limit) ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - ctf-network

  # --- MinIO (Evidence Blob Storage — S3-compatible) ---
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - ctf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Backend API ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: cyberthreatforge
      POSTGRES_USER: ctf_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - ctf-network

  # --- Frontend (Vite SPA) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    depends_on:
      - backend
    networks:
      - ctf-network

  # ═══════════════════════════════════════════════════════════════════════════
  # FORENSICS MODULE SERVICES (Python/FastAPI + PyTorch)
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Deepfake & Misinformation Multi-Modal Detector ──────────────────────
  deepfake-detector:
    build:
      context: ./modules/deepfake-detector
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      - redis
      - neo4j
    networks:
      - ctf-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Malware & Hardware Analysis Sandbox ─────────────────────────────────
  malware-sandbox:
    build:
      context: ./modules/malware-sandbox
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8200:8200"
    depends_on:
      - redis
    networks:
      - ctf-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Mobile & IoT Forensics Pipeline ─────────────────────────────────────
  mobile-iot-forensics:
    build:
      context: ./modules/mobile-iot-forensics
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8300:8300"
    depends_on:
      - redis
    networks:
      - ctf-network

  # ── Dark Web + Federated Intelligence ───────────────────────────────────
  darkweb-intel:
    build:
      context: ./modules/darkweb-intel
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8400:8400"
    environment:
      TOR_PROXY: socks5://tor-proxy:9050
    depends_on:
      - redis
    networks:
      - ctf-network
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE

  # ── Cyber Psychology Behavioral Profiler ────────────────────────────────
  cyber-psychology:
    build:
      context: ./modules/cyber-psychology
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8500:8500"
    depends_on:
      - redis
    networks:
      - ctf-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── OSINT & Social Media Intelligence ───────────────────────────────────
  osint-social-intel:
    build:
      context: ./modules/osint-social-intel
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8600:8600"
    depends_on:
      - redis
    networks:
      - ctf-network

  # ── Predictive Analytics & Threat Forecasting ───────────────────────────
  predictive-analytics:
    build:
      context: ./modules/predictive-analytics
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8700:8700"
    depends_on:
      - redis
    networks:
      - ctf-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Cross-Platform Evidence Correlation Engine ──────────────────────────
  evidence-correlation:
    build:
      context: ./modules/evidence-correlation
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8800:8800"
    depends_on:
      - neo4j
      - redis
    networks:
      - ctf-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  ctf-network:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  minio_data:
