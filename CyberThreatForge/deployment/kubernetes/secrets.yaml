apiVersion: v1
kind: Secret
metadata:
  name: ctf-secrets
  namespace: cyberthreatforge
type: Opaque
stringData:
  # Production secrets must be managed via SealedSecrets / External Secrets Operator / Vault
  JWT_SECRET: "replace-with-256bit-hex"
  JWT_REFRESH_SECRET: "replace-with-another-256bit-hex"
  ENCRYPTION_KEY: "replace-with-256bit-aes-hex-key"
  POSTGRES_PASSWORD: "replace-with-strong-password"
  NEO4J_PASSWORD: "replace-with-neo4j-password"
  REDIS_PASSWORD: "replace-with-redis-password"
  S3_ACCESS_KEY: "ctf_minio"
  S3_SECRET_KEY: "replace-with-minio-secret"
  AUDIT_HMAC_KEY: "replace-with-hmac-key"
  LLM_API_KEY: "sk-replace-with-openai-key"
