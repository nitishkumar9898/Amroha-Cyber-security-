apiVersion: v2
name: cyberthreatforge
description: CyberThreatForge — Law Enforcement Cyber Investigation & Threat Intelligence Platform
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - cyber-security
  - forensics
  - threat-intelligence
  - law-enforcement
  - investigation
  - ai

home: https://github.com/cyberthreatforge/platform
sources:
  - https://github.com/cyberthreatforge/platform

maintainers:
  - name: CyberThreatForge Team
    email: team@cyberthreatforge.io

dependencies:
  - name: postgresql
    version: "~15.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: neo4j
    version: "~5.0"
    repository: "https://helm.neo4j.com/neo4j"
    condition: neo4j.enabled
  - name: redis
    version: "~19.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: minio
    version: "~14.0"
    repository: "https://charts.min.io/"
    condition: minio.enabled
  - name: kafka
    version: "~28.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: kafka.enabled
