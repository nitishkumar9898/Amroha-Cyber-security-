apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberthreatforge-backend
  labels:
    app: cyberthreatforge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cyberthreatforge
  template:
    metadata:
      labels:
        app: cyberthreatforge
    spec:
      containers:
      - name: backend
        image: cyberthreatforge-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ctforge-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ctforge-secrets
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberthreatforge-worker
  labels:
    app: cyberthreatforge-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberthreatforge-worker
  template:
    metadata:
      labels:
        app: cyberthreatforge-worker
    spec:
      containers:
      - name: worker
        image: cyberthreatforge-backend:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "backend.app.tasks.anomaly_watcher"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ctforge-secrets
              key: DATABASE_URL
        resources:
          limits:
            cpu: "0.5"
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberthreatforge-frontend
  labels:
    app: cyberthreatforge-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cyberthreatforge-frontend
  template:
    metadata:
      labels:
        app: cyberthreatforge-frontend
    spec:
      containers:
      - name: frontend
        image: cyberthreatforge-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "0.5"
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cyberthreatforge-service
spec:
  type: LoadBalancer
  selector:
    app: cyberthreatforge
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
